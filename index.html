<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07090c" />
    <title>FatFeet TV</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260604-14" />
  </head>
  <body>
    <main class="tv-shell" id="app">
      <header class="app-header">
        <div class="brand">
          <img class="brand-logo" src="./assets/flying-cat-original.jpeg" alt="" />
          <span>FatFeet TV</span>
        </div>
        <div class="now">
          <span id="channelName">正在载入</span>
          <span id="programName">频道列表</span>
        </div>
        <div class="status" id="statusText">准备播放</div>
      </header>

      <div class="content-grid">
        <section class="stage" aria-label="电视播放">
          <div class="video-frame">
            <video
              id="player"
              class="player"
              playsinline
              preload="metadata"
              x-webkit-airplay="allow"
              disablepictureinpicture="false"
              tabindex="0"
            ></video>
            <button class="play-overlay" id="playOverlay" type="button" aria-label="播放" title="播放">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5.5v13l10-6.5-10-6.5Z" />
              </svg>
            </button>
            <div class="player-chrome" id="playerChrome" aria-label="播放器控制">
              <div class="player-control-strip">
                <button class="chrome-button play-toggle" id="playPauseButton" type="button" aria-label="播放" title="播放">
                  <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 5.5v13l10-6.5-10-6.5Z" />
                  </svg>
                  <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 5h3v14H7V5Zm7 0h3v14h-3V5Z" />
                  </svg>
                </button>
                <span class="live-pill">直播</span>
                <div class="volume-control" aria-label="音量">
                  <button class="chrome-button mute-toggle" id="muteButton" type="button" aria-label="静音" title="静音">
                    <svg class="icon-volume" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M4 9v6h4l5 4V5L8 9H4Zm12.5-2.5-1.4 1.4A5.1 5.1 0 0 1 17 12a5.1 5.1 0 0 1-1.9 4.1l1.4 1.4A7.1 7.1 0 0 0 19 12a7.1 7.1 0 0 0-2.5-5.5Z" />
                    </svg>
                    <svg class="icon-muted" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M4 9v6h4l5 4V5L8 9H4Zm11.2.1L17.1 12l-1.9 2.9 1.6 1.1 1.5-2.4 1.5 2.4 1.6-1.1L19.5 12l1.9-2.9-1.6-1.1-1.5 2.4-1.5-2.4-1.6 1.1Z" />
                    </svg>
                  </button>
                  <input id="volumeSlider" class="volume-slider" type="range" min="0" max="1" step="0.01" value="1" aria-label="音量" />
                </div>
                <div class="player-control-spacer"></div>
                <div class="view-mode-controls" aria-label="视频显示模式">
                  <button
                    class="chrome-button"
                    id="castButton"
                    type="button"
                    aria-label="投屏"
                    title="投屏"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v9A2.5 2.5 0 0 1 17.5 18H15v-2h2.5a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-11a.5.5 0 0 0-.5.5V9H4V6.5Zm0 6.5a7 7 0 0 1 7 7H8a4 4 0 0 0-4-4v-3Zm0 4a3 3 0 0 1 3 3H4v-3Zm0-8a11 11 0 0 1 11 11h-3A8 8 0 0 0 4 12V9Z" />
                    </svg>
                  </button>
                  <button
                    class="chrome-button"
                    id="pageMaxButton"
                    type="button"
                    aria-label="网页最大化"
                    aria-pressed="false"
                    title="网页最大化"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h13A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5v-13Zm2 1V9h2V6.5H6Zm10 0V9h2V6.5h-2ZM6 15v2.5h2V15H6Zm10 2.5h2V15h-2v2.5Z" />
                    </svg>
                  </button>
                  <button
                    class="chrome-button"
                    id="theaterButton"
                    type="button"
                    aria-label="影院模式"
                    aria-pressed="false"
                    title="影院模式"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5h13A2.5 2.5 0 0 1 21 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 16.5v-9Zm3 .5v8h12V8H6Z" />
                    </svg>
                  </button>
                  <button
                    class="chrome-button"
                    id="systemFullscreenButton"
                    type="button"
                    aria-label="电脑全屏"
                    aria-pressed="false"
                    title="电脑全屏"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M4 4h6v2H6v4H4V4Zm10 0h6v6h-2V6h-4V4ZM4 14h2v4h4v2H4v-6Zm14 0h2v6h-6v-2h4v-4Z" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <div class="center-toast" id="centerToast" hidden></div>
          </div>
        </section>

        <aside class="guide is-open" id="guide" aria-label="频道和节目单" aria-hidden="false">
          <div class="guide-head">
            <div>
              <p>中国电视</p>
              <h1>频道与节目</h1>
            </div>
            <div class="guide-actions">
              <button class="secondary-button" id="libraryButton" type="button">频道库</button>
              <button class="refresh-button" id="refreshButton" type="button">刷新列表</button>
            </div>
          </div>

          <div class="guide-search">
            <input id="channelSearch" type="search" placeholder="搜索频道" aria-label="搜索频道" />
          </div>
          <div class="category-tabs" id="categoryTabs" aria-label="频道分类"></div>
          <nav class="channel-list" id="channelList" aria-label="频道列表"></nav>

          <section class="schedule" aria-label="节目单">
            <div class="schedule-head">
              <span>正在播放</span>
              <strong id="scheduleChannel">-</strong>
            </div>
            <div id="scheduleList" class="schedule-list"></div>
          </section>

          <section class="source-panel" aria-label="线路选择">
            <div class="schedule-head">
              <span>线路</span>
              <strong id="sourceHealth">自动优选</strong>
            </div>
            <div id="sourceList" class="source-list"></div>
          </section>
        </aside>
      </div>

      <section class="library-modal" id="libraryModal" hidden aria-label="频道库">
        <div class="library-panel" role="dialog" aria-modal="true" aria-labelledby="libraryTitle">
          <div class="library-head">
            <div>
              <p>全部频道</p>
              <h2 id="libraryTitle">频道库</h2>
            </div>
            <button class="close-button" id="libraryCloseButton" type="button">关闭</button>
          </div>
          <div class="library-controls">
            <input id="librarySearch" type="search" placeholder="搜索 CCTV、湖南、凤凰..." aria-label="在频道库搜索" />
            <div class="category-tabs is-large" id="libraryTabs" aria-label="频道库分类"></div>
          </div>
          <div class="library-list" id="libraryList"></div>
        </div>
      </section>

    </main>

    <script src="./hls.min.js?v=20260604-4"></script>
    <script src="./app.js?v=20260604-14" type="module"></script>
  </body>
</html>
